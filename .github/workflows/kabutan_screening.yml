name: Kabutan 決算通知

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00 (JST 9:00 に合わせる場合 UTC 0:00 で OK)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LINE_TOKEN: ${{ secrets.LINE_TOKEN }}

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリチェックアウト
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 必要ライブラリインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance pytz

      - name: スクリーニングスクリプト実行
        run: python kabutan_final_full_run_notify.py
