name: Kabutan 決算通知 (Discord)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 毎日 JST 9:00

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要ライブラリインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 yfinance pandas pytz

      - name: スクリーニング実行
        run: python kabutan_discord.py
