# .github/workflows/main.yml
name: Daily Stock Notification

# 実行タイミング
on:
  schedule:
    - cron: '50 6 * * 1-5'    # 月〜金 16:00 JST（UTC 7:00）
  workflow_dispatch:         # 手動実行も可能

jobs:
  run_screening:
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードを取得
      - uses: actions/checkout@v3

      # Python セットアップ
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 依存ライブラリインストール
      - name: Install dependencies
        run: pip install -r requirements.txt

      # スクリプト実行
      - name: Run kabutan_final.py
        run: python kabutan_final.py
