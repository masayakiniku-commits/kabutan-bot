name: 株決算通知

# ----------------------------------------
# トリガー：push（自動）＋手動実行
# ----------------------------------------
on:
  push:
    branches: [ main ]   # mainブランチにpush時に自動実行
  workflow_dispatch:     # 手動実行用ボタンを有効化

# ----------------------------------------
# 実行環境
# ----------------------------------------
jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # Pythonセットアップ
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 必要パッケージをインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 環境変数にLINEトークンを設定（Secretsから取得）
      - name: Set LINE_TOKEN
        run: echo "LINE_TOKEN=${{ secrets.LINE_TOKEN }}" >> $GITHUB_ENV

      # スクリプト実行
      - name: Run screening
        run: |
          python kabutan_final.py
