name: Kabutan Screening

on:
  workflow_dispatch:

jobs:
  run-screening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Screening
        run: python kabutan_final_full_run.py 2026-02-13
