name: Daily Stock Notification

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 月〜金 16:00 JST（UTC 7:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  run_screening:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------
      # 前回ログをダウンロード（存在しない場合はスキップ）
      # ----------------------
      - name: Download previous log
        uses: actions/download-artifact@v4
        with:
          name: trade-log
          path: ./
        continue-on-error: true  # artifactがなくてもスキップ

      # ----------------------
      # スクリプト実行
      # ----------------------
      - name: Run kabutan_final.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python kabutan_final.py

      # ----------------------
      # 実行後ログをアップロード
      # ----------------------
      - name: Upload trade log
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: trade_log.csv
