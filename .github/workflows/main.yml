name: Daily Kabutan Screening

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 日本時間15時に平日実行
  workflow_dispatch:        # 手動実行も可能

jobs:
  run-screening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run screening
        run: |
          python kabutan_final_full_run.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
