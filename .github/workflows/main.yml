import os
import csv
from datetime import datetime
import requests
from bs4 import BeautifulSoup
import yfinance as yf

LINE_TOKEN = os.getenv("LINE_TOKEN")
LOG_FILE = "trade_log.csv"

# ----------------------
# 初回ファイル作成（存在しない場合）
# ----------------------
if not os.path.exists(LOG_FILE):
    with open(LOG_FILE, "w", newline="", encoding="utf-8") as f:
        writer = csv.writer(f)
        writer.writerow(["date", "code", "rank", "score"])

# ----------------------
# LINE送信
# ----------------------
def send_line(msg):
    url = "https://api.line.me/v2/bot/message/broadcast"
    headers = {
        "Authorization": f"Bearer {LINE_TOKEN}",
        "Content-Type": "application/json"
    }
    try:
        res = requests.post(url, headers=headers, json={"messages":[{"type":"text","text":msg}]}, timeout=10)
        res.raise_for_status()
    except Exception as e:
        print(f"LINE送信エラー: {e}")

# ----------------------
# 決算銘柄取得
# ----------------------
def get_codes():
    url = "https://kabutan.jp/warning/?mode=1_2"
    res = requests.get(url, headers={"User-Agent":"Mozilla"})
    soup = BeautifulSoup(res.text, "html.parser")
    codes = []
    for a in soup.find_all("a"):
        href = a.get("href","")
        if "/stock/" in href:
            c = href.split("/stock/")[1].split("/")[0]
            if c.isdigit() and len(c)==4:
                codes.append(c)
    return list(set(codes))

# ----------------------
# 以下、既存の関数をそのまま利用
# trend_reversal, volume_check, valuation, pdf_score, evaluate, save_log, weekly_ranking, win_rate, next_watchlist
# ----------------------

# メイン
def run_screening():
    today = datetime.today().weekday()
    codes = get_codes()

    # 土日 → 週まとめ
    if today >= 5:
        msg = "📊週次レポート\n\n"
        msg += weekly_ranking()
        msg += win_rate()
        msg += next_watchlist()
        send_line(msg)
        return

    # 平日
    if not codes:
        send_line("本日決算なし")
        return

    results = []
    for c in codes:
        rank, score = evaluate(c)
        results.append((c, rank, score))

    results.sort(key=lambda x: x[2], reverse=True)
    save_log(results)

    msg = "【決算初動スクリーニング】★直後\n"
    for r in results[:10]:
        msg += f"{r[0]} {r[1]}({r[2]})\n"
    send_line(msg)

if __name__ == "__main__":
    run_screening()
